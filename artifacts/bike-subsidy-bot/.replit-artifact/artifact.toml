kind = "web"
previewPath = "/"
title = "Bike Subsidy Registration Bot"
version = "1.0.0"
id = "artifacts/bike-subsidy-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20328

[services.development]
run = "pnpm --filter @workspace/bike-subsidy-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bike-subsidy-bot", "run", "build" ]
publicDir = "artifacts/bike-subsidy-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20328"
BASE_PATH = "/"
